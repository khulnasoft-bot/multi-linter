# PR Labeler Configuration (v5 format)
# Auto-label PRs based on changed files

linters:
  - changed-files:
    - any: ["linters/**/*"]

ci:
  - changed-files:
    - any: [".github/workflows/*"]

docker:
  - changed-files:
    - any: ["action/Dockerfile", "docker/**/*"]

documentation:
  - changed-files:
    - any: ["*.md", "docs/**/*"]

tests:
  - changed-files:
    - any: ["tests/**/*"]
