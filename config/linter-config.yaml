version: 1.0
fail_on_error: true
report_format: github

linters:
  # JavaScript/TypeScript
  eslint:
    enabled: true
    paths: ["**/*.js", "**/*.ts", "linters/**/*.js", "scripts/**/*.js"]
    auto_fix: true
    config_file: ".eslintrc.json"
    fail_on_warning: false
  prettier:
    enabled: true
    paths: ["**/*.js", "**/*.ts", "**/*.css", "**/*.scss", "linters/**/*.js", "scripts/**/*.js"]
    auto_fix: true
    fail_on_warning: false
  stylelint:
    enabled: true
    paths: ["**/*.css", "**/*.scss", "**/*.less"]
    auto_fix: true
    config_file: ".stylelintrc.json"
    fail_on_warning: false
  markdownlint:
    enabled: true
    paths: ["**/*.md"]
    config_file: ".markdownlint.yaml"
    fail_on_warning: false
  tsc:
    enabled: false
    paths: ["**/*.ts", "**/*.tsx"]
    fail_on_warning: false
  biome:
    enabled: false
    paths: ["**/*"]
    auto_fix: true
    fail_on_warning: false

  # JSON
  jsonlint:
    enabled: true
    paths: ["**/*.json"]
    fail_on_warning: false

  # HTML
  htmlhint:
    enabled: true
    paths: ["**/*.html"]
    config_file: ".htmlhintrc"
    fail_on_warning: false

  # Python
  flake8:
    enabled: true
    paths: ["**/*.py"]
    max_line_length: 120
    fail_on_warning: false
  black:
    enabled: true
    paths: ["**/*.py"]
    auto_fix: true
    fail_on_warning: false
  mypy:
    enabled: true
    paths: ["**/*.py"]
    fail_on_warning: false
  pylint:
    enabled: true
    paths: ["**/*.py"]
    fail_on_warning: false
  isort:
    enabled: true
    paths: ["**/*.py"]
    auto_fix: true
    fail_on_warning: false
  bandit:
    enabled: true
    paths: ["**/*.py"]
    fail_on_warning: false
  ruff:
    enabled: true
    paths: ["**/*.py"]
    auto_fix: true
    fail_on_warning: false

  # Go
  golangci-lint:
    enabled: true
    paths: ["./..."]
    config_file: ".golangci.yml"
    fail_on_warning: false
  gofmt:
    enabled: true
    paths: ["**/*.go"]
    auto_fix: true
    fail_on_warning: false
  govet:
    enabled: true
    paths: ["**/*.go"]
    fail_on_warning: false

  # Rust
  clippy:
    enabled: true
    paths: ["."]
    fail_on_warning: false
  rustfmt:
    enabled: true
    paths: ["**/*.rs"]
    auto_fix: true
    fail_on_warning: false

  # YAML
  yamllint:
    enabled: true
    paths: ["**/*.yml", "**/*.yaml"]
    config_file: ".yamllint.yaml"
    fail_on_warning: false

  # GitHub Actions Linter Config
  github-linter:
    enabled: true
    paths: [".github/linters/*.yml"]
    config_file: ".yamllint.yaml"
    fail_on_warning: false

  # Shell
  shellcheck:
    enabled: true
    paths: ["**/*.sh"]
    config_file: ".shellcheckrc"
    fail_on_warning: false
  shfmt:
    enabled: true
    paths: ["**/*.sh"]
    auto_fix: true
    fail_on_warning: false

  # Docker
  hadolint:
    enabled: true
    paths: ["**/Dockerfile*"]
    config_file: ".hadolint.yaml"
    fail_on_warning: false

  # Java
  checkstyle:
    enabled: true
    paths: ["**/*.java"]
    config_file: "checkstyle.xml"
    fail_on_warning: false

  # Kotlin
  ktlint:
    enabled: true
    paths: ["**/*.kt"]
    auto_fix: true
    fail_on_warning: false

  # Terraform
  terraform:
    enabled: true
    paths: ["**/*.tf"]
    fail_on_warning: false
  tflint:
    enabled: true
    paths: ["**/*.tf"]
    config_file: ".tflint.hcl"
    fail_on_warning: false

  # CloudFormation
  cfn-lint:
    enabled: true
    paths: ["**/cloudformation/**/*.yaml", "**/cloudformation/**/*.yml"]
    fail_on_warning: false

  # Kubernetes
  kubeconform:
    enabled: true
    paths: ["**/*.yaml"]
    fail_on_warning: false

  # Ansible
  ansible-lint:
    enabled: true
    paths: ["**/*.yml", "**/*.yaml"]
    config_file: ".ansible-lint.yml"
    fail_on_warning: false

  # GitHub Actions
  actionlint:
    enabled: true
    paths: [".github/workflows/**/*.yml", ".github/workflows/**/*.yaml"]
    config_file: ".actionlint.yaml"
    fail_on_warning: false

  # Ruby
  rubocop:
    enabled: true
    paths: ["**/*.rb"]
    auto_fix: true
    fail_on_warning: false

  # Lua
  luacheck:
    enabled: true
    paths: ["**/*.lua"]
    fail_on_warning: false

  # LaTeX
  chktex:
    enabled: true
    paths: ["**/*.tex"]
    fail_on_warning: false

  # SQL
  sqlfluff:
    enabled: true
    paths: ["**/*.sql"]
    fail_on_warning: false

  # .env files
  dotenv-linter:
    enabled: true
    paths: ["**/.env*"]
    fail_on_warning: false

  # Secrets detection
  gitleaks:
    enabled: true
    paths: ["."]
    fail_on_warning: false

  # Spell check
  codespell:
    enabled: true
    paths: ["**/*.md", "**/*.txt"]
    fail_on_warning: false

  # XML
  xmllint:
    enabled: true
    paths: ["**/*.xml"]
    fail_on_warning: false

  # Protocol Buffers
  protolint:
    enabled: true
    paths: ["**/*.proto"]
    fail_on_warning: false

  # Commit messages
  commitlint:
    enabled: false
    paths: [".git/COMMIT_EDITMSG"]
    fail_on_warning: false

  # EditorConfig
  editorconfig-checker:
    enabled: false
    paths: ["**/.editorconfig"]
    fail_on_warning: false

  # GoReleaser
  goreleaser:
    enabled: false
    paths: [".goreleaser.yaml", ".goreleaser.yml"]
    fail_on_warning: false

  # OpenAPI (Spectral)
  spectral:
    enabled: false
    paths: ["**/*.yaml", "**/*.yml", "**/*.json"]
    fail_on_warning: false

  # Natural language
  textlint:
    enabled: false
    paths: ["**/*.md", "**/*.txt"]
    fail_on_warning: false

  # IaC security (Checkov)
  checkov:
    enabled: false
    paths: ["."]
    frameworks: "all"
    fail_on_warning: false

  # Vulnerability scanner (Trivy)
  trivy:
    enabled: false
    paths: ["."]
    scan_type: "config"
    fail_on_warning: false

  # Copy/paste detection
  jscpd:
    enabled: false
    paths: ["."]
    threshold: 50
    fail_on_warning: false

  # C/C++
  cpplint:
    enabled: false
    paths: ["**/*.c", "**/*.cpp", "**/*.h", "**/*.hpp"]
    filters: "-whitespace/indent"
    fail_on_warning: false
  clang-format:
    enabled: false
    paths: ["**/*.c", "**/*.cpp", "**/*.h", "**/*.hpp"]
    fail_on_warning: false

  # Terragrunt
  terragrunt:
    enabled: false
    paths: ["."]
    fail_on_warning: false

  # Renovate
  renovate-config-validator:
    enabled: false
    paths: ["renovate.json", "renovate.json5"]
    fail_on_warning: false

  # PHP
  php-lint:
    enabled: false
    paths: ["**/*.php"]
    fail_on_warning: false
  phpcs:
    enabled: false
    paths: ["**/*.php"]
    standard: "PSR12"
    fail_on_warning: false
  phpstan:
    enabled: false
    paths: ["."]
    level: 6
    fail_on_warning: false
  psalm:
    enabled: false
    paths: ["."]
    fail_on_warning: false

  # Perl
  perlcritic:
    enabled: false
    paths: ["**/*.pl", "**/*.pm"]
    fail_on_warning: false

  # R
  lintr:
    enabled: false
    paths: ["**/*.R", "**/*.r"]
    fail_on_warning: false

  # Scala
  scalafmt:
    enabled: false
    paths: ["**/*.scala"]
    fail_on_warning: false

  # .NET / C#
  dotnet-format:
    enabled: false
    paths: ["**/*.cs", "**/*.sln"]
    fail_on_warning: false

  # Dart
  dart-analyze:
    enabled: false
    paths: ["."]
    fail_on_warning: false

  # Clojure
  clj-kondo:
    enabled: false
    paths: ["**/*.clj", "**/*.cljs", "**/*.cljc"]
    fail_on_warning: false

  # CoffeeScript
  coffeelint:
    enabled: false
    paths: ["**/*.coffee"]
    fail_on_warning: false

  # GitHub Actions security
  zizmor:
    enabled: false
    paths: [".github/workflows/*.yml"]
    fail_on_warning: false

  # Groovy
  npm-groovy-lint:
    enabled: false
    paths: ["**/*.groovy"]
    fail_on_warning: false

  # Java formatter
  google-java-format:
    enabled: false
    paths: ["**/*.java"]
    fail_on_warning: false

  # PowerShell
  psscriptanalyzer:
    enabled: false
    paths: ["**/*.ps1", "**/*.psm1"]
    fail_on_warning: false

  # Snakemake
  snakemake-lint:
    enabled: false
    paths: ["**/Snakefile", "**/*.smk"]
    fail_on_warning: false
  snakefmt:
    enabled: false
    paths: ["**/Snakefile", "**/*.smk"]
    fail_on_warning: false

  # Git conflict markers
  conflict-marker:
    enabled: true
    paths: ["."]
    fail_on_warning: false

  # Amazon States Language
  asl-validator:
    enabled: false
    paths: ["**/*.asl.json"]
    fail_on_warning: false

  # ARM Templates
  arm-ttk:
    enabled: false
    paths: ["**/*.json"]
    fail_on_warning: false

  # Pre-commit
  pre-commit:
    enabled: false
    paths: [".pre-commit-config.yaml"]
    fail_on_warning: false
